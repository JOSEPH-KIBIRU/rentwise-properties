[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"  

# 🔑 CRITICAL: Bypasses SPA routing so Google gets the actual XML file
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"